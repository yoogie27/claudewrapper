<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1117" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f5f6fa" media="(prefers-color-scheme: light)">
    <title>{% block title %}ClaudeWrapper{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Theme: apply immediately to prevent flash
        (function() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const dark = saved ? saved === 'dark' : prefersDark;
            if (dark) document.documentElement.classList.add('dark');
        })();
    </script>
</head>
<body>
    {% block body %}{% endblock %}

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script>
        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('hljs-dark').disabled = !isDark;
            document.getElementById('hljs-light').disabled = isDark;
            updateThemeIcon();
        }
        function updateThemeIcon() {
            const btn = document.getElementById('theme-toggle');
            if (!btn) return;
            const isDark = document.documentElement.classList.contains('dark');
            btn.textContent = isDark ? '\u2600' : '\u263E';
        }
        document.addEventListener('DOMContentLoaded', updateThemeIcon);

        // Toast system (HTML-safe)
        window.toast = function(title, message, type = 'info') {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            const strong = document.createElement('strong');
            strong.textContent = title;
            el.appendChild(strong);
            if (message) {
                const p = document.createElement('p');
                p.textContent = message;
                el.appendChild(p);
            }
            container.appendChild(el);
            setTimeout(() => { el.classList.add('toast-exit'); setTimeout(() => el.remove(), 300); }, 4000);
        };

        // ── Notification sound (Web Audio API — no external files needed) ──
        window._notifCtx = null;
        window.playNotificationSound = function() {
            try {
                if (!window._notifCtx) window._notifCtx = new (window.AudioContext || window.webkitAudioContext)();
                const ctx = window._notifCtx;
                const now = ctx.currentTime;
                const gain = ctx.createGain();
                gain.connect(ctx.destination);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                // Two-tone ding: E5 then G5
                [659.25, 783.99].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    osc.connect(gain);
                    osc.start(now + i * 0.15);
                    osc.stop(now + i * 0.15 + 0.3);
                });
            } catch {}
        };

        // ── Browser notifications (asks permission on first use) ──
        window.sendBrowserNotification = function(title, body) {
            if (!('Notification' in window)) return;
            if (Notification.permission === 'granted') {
                new Notification(title, { body, icon: '/static/favicon.ico' });
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(p => {
                    if (p === 'granted') new Notification(title, { body, icon: '/static/favicon.ico' });
                });
            }
        };

        // Markdown renderer setup
        if (window.marked) {
            marked.setOptions({ breaks: true, gfm: true });
        }

        // Safe highlight helper (avoids double-highlight warnings)
        function highlightCode(container) {
            container.querySelectorAll('pre code:not(.hljs)').forEach(block => {
                hljs.highlightElement(block);
            });
        }
    </script>
</body>
</html>
