{% extends "base.html" %}
{% block title %}Prompt — {{ identifier }} - ClaudeWrapper{% endblock %}

{% block content %}
<div class="page-header flex-between">
  <div>
    <h1>Prompt — {{ identifier }}</h1>
    <p>The exact prompt sent to Claude for this ticket</p>
  </div>
  <div class="btn-group">
    <a href="/sessions/{{ identifier }}/log" class="btn btn-sm btn-secondary">View Log</a>
    <a href="/" class="btn btn-sm btn-secondary">Dashboard</a>
  </div>
</div>

<div class="card" style="padding:0; overflow:hidden;">
  <div class="terminal" style="border-radius:var(--radius); max-height:85vh;">{{ content }}</div>
</div>
{% endblock %}
