services:
  claudewrapper:
    build: .
    container_name: claudewrapper
    ports:
      - "8645:8645"
    volumes:
      - /opt/claudewrapper/data:/data
      - /opt/claudewrapper/ssh-keys:/data/ssh
      - /srv/claudewrapper/repos:/srv/repos
      - /opt/claudewrapper/config/.claude:/root/.claude
    environment:
      - LINEAR_API_KEY
      - GITHUB_TOKEN
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8645
      - DATA_DIR=/data
      - SSH_KEY_DIR=/data/ssh
      - REPOS_DIR=/data/repos
      - WORKTREE_ROOT=/data/worktrees
      - USE_GIT_WORKTREES=true
    env_file:
      - .env.dockhand
    restart: unless-stopped

volumes:
  data:
  ssh-keys:
  repos:
